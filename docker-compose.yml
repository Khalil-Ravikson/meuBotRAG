version: '3.8'

# =============================================================================
# docker-compose.yml — Bot UEMA v4.0 (Assíncrono com Celery)
# =============================================================================

networks:
  uema:
    driver: bridge
    name: uema_network

services:

  # ---------------------------------------------------------------------------
  # 1. Redis Stack
  # ---------------------------------------------------------------------------
  redis:
    image: redis/redis-stack:latest
    container_name: redis-stack
    restart: unless-stopped
    networks:
      - uema
    ports:
      - "6379:6379"
      - "8001:8001"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - redis-data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: >
      redis-stack-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # 2. PostgreSQL — EXCLUSIVO da Evolution API
  # ---------------------------------------------------------------------------
  evolution-postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    networks:
      - uema
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS:-evo_pass_2024}
      - TZ=America/Sao_Paulo
    volumes:
      - evolution-pg-data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # 3. Evolution API v2
  # ---------------------------------------------------------------------------
  evolution-api:
    build:
      context: https://github.com/EvolutionAPI/evolution-api.git#2.3.7
      dockerfile: ./Dockerfile
    image: evolution-api-local:2.3.7  
    container_name: evolution-api
    restart: unless-stopped
    networks:
      - uema
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - TZ=America/Sao_Paulo

      # PostgreSQL
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASS:-evo_pass_2024}@evolution-postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false

      # Cache Redis DB 1
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false

      # Webhook
      - WEBHOOK_GLOBAL_URL=http://bot:9000/webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1032691661

    volumes:
      - ./evolution_instances:/evolution/instances
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      redis:
        condition: service_healthy
      evolution-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # 4. Bot RAG (Rececionista Webhook)
  # ---------------------------------------------------------------------------
  bot:
    build: .
    container_name: bot
    restart: unless-stopped
    networks:
      - uema
    depends_on:
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started
    ports:
      - "9000:9000"
    volumes:
      - ./dados:/app/dados
      - ./src:/app/src
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - EVOLUTION_BASE_URL=http://evolution-api:8080
      - WHATSAPP_HOOK_URL=http://bot:9000/webhook
      - TZ=America/Sao_Paulo
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # 5. Celery Worker (Processamento Pesado em Background V4)
  # ---------------------------------------------------------------------------
  celery-worker:
    build: .
    container_name: celery-worker
    restart: unless-stopped
    networks:
      - uema
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./dados:/app/dados
      - ./src:/app/src
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - EVOLUTION_BASE_URL=http://evolution-api:8080
      - TZ=America/Sao_Paulo
    command: celery -A src.infrastructure.celery_app.celery_app worker --loglevel=info --concurrency=2

volumes:
  redis-data:
    driver: local
  evolution-pg-data:
    driver: local