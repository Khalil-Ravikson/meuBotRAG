version: '3.8'

# =============================================================================
# docker-compose.yml — Bot UEMA v3.2
# =============================================================================
#
# CORRECÇÕES v3.2:
# ─────────────────
#   1. CORRECÇÃO CRÍTICA: Evolution API v2 não suporta SQLite.
#      A v2.0.0 migrou para Prisma ORM — só aceita postgresql ou mysql.
#      Adicionado postgres:16-alpine EXCLUSIVO para a Evolution API.
#      O bot RAG continua a usar APENAS Redis Stack (sem PostgreSQL para o bot).
#
#   2. Evolution Manager configurado com VITE_API_URL para o browser Windows.
#
#   3. Porta do bot: 9000.
#
#   4. Rede 'bot': todos os serviços partilham a mesma rede bridge.
#
#   5. Volume 'evolution-pg-data' persiste o PostgreSQL da Evolution API.
#
#   6. Redis Stack: maxmemory via command (mais fiável que env).
#
# ---------------------------------------------------------------------------
# ARQUITECTURA DE DADOS:
#
#   Redis Stack (DB 0) <-> Bot RAG
#     chunks RAG, memória, vectores, routing semântico
#
#   PostgreSQL (evolution) <-> Evolution API
#     instâncias WhatsApp, sessões Baileys, histórico de mensagens
#
#   Redis Stack (DB 1) <-> Evolution API (cache)
#     cache de sessões — prefixo "evolution"
#
# ---------------------------------------------------------------------------
# VARIÁVEIS NECESSÁRIAS NO .env:
#   EVOLUTION_API_KEY=a_tua_chave_aqui
#   EVOLUTION_DB_PASS=uma_password_segura   <- nova (ou usa o default abaixo)
#
# ---------------------------------------------------------------------------
# PORTAS EXPOSTAS:
#   6379  -> Redis Stack
#   8001  -> RedisInsight  (http://localhost:8001)
#   8080  -> Evolution API
#   3001  -> Evolution Manager (http://localhost:3001)
#   9000  -> Bot FastAPI
#   PostgreSQL da Evolution NAO exposto ao host (so interno Docker)
#
# =============================================================================

networks:
  bot:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # 1. Redis Stack — Cache + Vector Store + Memory do Bot
  #    RAM: ~120MB idle
  # ---------------------------------------------------------------------------
  redis:
    image: redis/redis-stack:latest
    container_name: redis-stack
    restart: unless-stopped
    networks:
      - bot
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    command: >
      redis-stack-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 100
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # 2. PostgreSQL — EXCLUSIVO da Evolution API
  #
  #    A Evolution API v2 usa Prisma ORM: so suporta postgresql ou mysql.
  #    SQLite foi removido na v2.0.0.
  #    Este Postgres NAO e usado pelo bot RAG.
  #    RAM: ~25MB idle (postgres:16-alpine).
  # ---------------------------------------------------------------------------
  evolution-postgres:
    image: postgres:16-alpine
    container_name: evolution_postgres
    restart: unless-stopped
    networks:
      - bot
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS:-evo_pass_segura_2024}
    volumes:
      - evolution-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # 3. Evolution API v2 — Motor WhatsApp
  #
  #    DATABASE_PROVIDER=postgresql (SQLite invalido na v2)
  # ---------------------------------------------------------------------------
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution_api
    restart: unless-stopped
    networks:
      - bot
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}

      # Base de dados PostgreSQL (obrigatorio na v2)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASS:-evo_pass_segura_2024}@evolution-postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true

      # Cache Redis DB 1 (bot usa DB 0 — sem conflito)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false

      # Webhook aponta para o bot
      - WEBHOOK_GLOBAL_URL=http://bot:9000/webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1032691661

    volumes:
      - ./evolution_instances:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
      evolution-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # 4. Evolution Manager — Painel Web
  #    http://localhost:3001
  #    Alternativa nativa: http://localhost:8080/manager
  # ---------------------------------------------------------------------------
  evolution-manager:
    image: atendai/evolution-manager:latest
    container_name: evolution_manager
    restart: unless-stopped
    networks:
      - bot
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=http://localhost:8080
      # - VITE_GLOBAL_API_KEY=${EVOLUTION_API_KEY}
    depends_on:
      - evolution-api

  # ---------------------------------------------------------------------------
  # 5. Bot RAG — Aplicacao principal
  # ---------------------------------------------------------------------------
  bot:
    build: .
    container_name: bot-rag
    restart: unless-stopped
    networks:
      - bot
    depends_on:
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started
    ports:
      - "9000:9000"
    volumes:
      - ./dados:/app/dados
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - EVOLUTION_BASE_URL=http://evolution-api:8080
      - WHATSAPP_HOOK_URL=http://bot:9000/webhook
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis-data:
    driver: local
  evolution-pg-data:
    driver: local